<div class="app-shell">
  <header class="app-header">
    <div class="brand-area">
      <div class="brand-title">CareSoft Tasks</div>
      <div class="brand-note">Task tracking for you and the team.</div>
    </div>

    <nav class="nav-links">
      <a routerLink="/tasks" routerLinkActive="active" *ngIf="isAuthenticated">Tasks</a>
      <a routerLink="/login" routerLinkActive="active" *ngIf="!isAuthenticated">Log in</a>
      <a routerLink="/signup" routerLinkActive="active" *ngIf="!isAuthenticated">Sign up</a>
      <button class="logout-button" type="button" (click)="logout()" *ngIf="isAuthenticated">Logout</button>
    </nav>
  </header>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
